name: quick
description: "Implement and review — fast path for well-understood changes"
stages:
  - name: implement
    archetype: implement
    description: "Write the code"
    write_set:
      - "{target}"
    context: "Implement {feature} in {target}"
    success_criteria:
      - "make check passes"
      - "new code has tests"
  - name: review
    archetype: review
    description: "Review the implementation"
    inputs_from: implement
    write_set:
      - ".tmp/review-{feature}.md"
    context: "Review the {feature} implementation"
    success_criteria:
      - "findings reported with severity and file:line references"
