name: docs
description: "Documentation-only change — design and review"
stages:
  - name: design
    archetype: design
    description: "Write or update documentation"
    write_set:
      - "docs/{feature}.md"
    context: "Write or update documentation for {feature}"
    success_criteria:
      - "covers problem, chosen approach, concrete examples"
  - name: review
    archetype: report
    description: "Review the documentation"
    inputs_from: design
    write_set:
      - ".tmp/review-{feature}.md"
    context: "Review the {feature} documentation"
    success_criteria:
      - "findings reported with severity and file:line references"
