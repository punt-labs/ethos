name: standard
description: "Design, implement, test, and review — default feature lifecycle"
stages:
  - name: design
    archetype: design
    description: "Produce the design document"
  - name: implement
    archetype: implement
    description: "Write the code from the design"
    inputs_from: design
  - name: test
    archetype: test
    description: "Add integration and edge-case tests"
    inputs_from: implement
  - name: review
    archetype: review
    description: "Review the complete change"
    inputs_from: test
