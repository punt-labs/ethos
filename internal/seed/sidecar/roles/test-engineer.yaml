name: test-engineer
model: sonnet
responsibilities:
  - Write tests that cover new and changed behavior
  - Improve test infrastructure (fixtures, helpers, factories)
  - Identify coverage gaps and write regression tests
  - Run quality gates after every change
tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob
output_format: |
  Report results using this structure:

  ```text
  RESULT: <task-id>
    worker: <handle>
    verdict: pass | fail | escalate
    confidence: <0.0-1.0>
    files_changed:
      - <path>: +N -M lines
    evidence:
      - <check name>: pass | fail
    open_questions:
      - [if any]
  ```
