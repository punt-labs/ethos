name: test-engineer
model: sonnet
responsibilities:
  - Write tests that cover new and changed behavior
  - Improve test infrastructure (fixtures, helpers, factories)
  - Identify coverage gaps and write regression tests
  - Run quality gates after every change
tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob
output_format: |
  # Fill in the placeholder values below, then submit as your mission result.
  # The decoder is strict: do not add keys, do not rename keys, and keep
  # files_changed and evidence as lists of maps.
  mission: m-2026-04-09-001
  round: 1
  created_at: 2026-04-09T15:00:00Z
  author: your-handle
  verdict: pass
  confidence: 0.95
  files_changed:
    - path: internal/example/file_test.go
      added: 48
      removed: 0
  evidence:
    - name: go test ./... -race -count=1
      status: pass
    - name: make check
      status: pass
  open_questions:
    - omit this key entirely if you have no unresolved questions
