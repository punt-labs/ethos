success_criteria:
    - Amend docs/audit-seal.md per four operator rulings (2026-07-20), keeping the live/seal split, redact-at-write, pre-commit-primary structure intact
    - 'RULING 1 — live-file location moves to <repo>/.punt-labs/local/ethos/sessions/<session-id>.audit.jsonl. Rationale to state: fits the org *local* = machine-local-never-committed convention (.envrc.local, vox.local.md); the gitignore rule ships once via the punt-kit punt-labs-dir.md standard (merged e3ab9a3) and punt:init/audit enforcement; per-checkout isolation is automatic, which DELETES the checkout-path roster-scoping machinery entirely. Rejected: TMPDIR (.tmp/ is deletable scratch; unsealed audit is not scratch); .punt-labs/local/<branch>/ (sessions span branches — fragments one session''s log, orphans files on branch deletion, and chunk sealing removes the motivation); home-dir global tree (operator ruling supersedes the structural-vs-conventional argument; note the local zone also works in gitlink-mounted repos since .punt-labs/local is a sibling of the ethos subtree, though SEALED chunks remain gitlink-blocked until e29s)'
    - 'RULING 2 — merge conflicts must be structurally impossible, not resolved. Replace append-to-tracked-file sealing with CHUNK sealing: each seal writes a NEW immutable tracked file under the session''s repo directory (name encodes session + first/last line timestamp, e.g. audit-<first-ts>.jsonl with a collision-free encoding you specify); tracked files are never modified after creation. Two branches only ever ADD distinct files, so git merges are conflict-free with stock merge machinery. DELETE from the design: the merge driver + .gitattributes section, the byte-prefix invariant and verification, divergence detection/reseal verb, and the seal-resume offset machinery. Seal watermark = max line timestamp across the session''s existing chunks (scan at seal time); read path = concatenate this session''s chunks sorted by first-timestamp, then live-tail lines with ts > watermark. State crash behavior: a seal that dies after writing a chunk but before git add leaves an untracked complete chunk — picked up by the next commit; never partial (write temp + rename)'
    - 'RULING 3 — drop the committing-session-only sweep and all session-attribution logic: the pre-commit hook seals ALL pending live lines for the repo (every session directory under .punt-labs/local/ethos/). Squash-merge world: PR content attribution is a non-goal per operator. Move committing-session-only AND committing-plus-orphans into Rejected alternatives with the operator ruling; orphaned-session lines now land at the next commit automatically, which also deletes the orphan-detection (kill(pid,0)) machinery'
    - 'RULING 4 — no seq field. Ordering and identity come from timestamps: the writer enforces strictly-monotonic per-session ts at append time under the existing flock (if now <= last ts, bump by 1ns — monotonic-clock discipline, addresses the NTP/coarse-clock collision concern without a schema field). Line identity where needed = (session, ts). Move seq into Rejected alternatives with the operator ruling. Chunk concatenation must not depend on cross-line dedup'
    - 'Migration section simplifies accordingly: every existing committed audit.jsonl/log.jsonl is a frozen historical chunk, never rewritten; live location seeding is no longer needed (chunks are additive; the watermark starts at the max ts of existing committed chunks). Mission-tree log.jsonl gets the same chunk treatment. Lock relocation (untrack + disk-remove, global-tree locks) is UNCHANGED by these rulings — keep it'
    - 'Update the invariant block (I10/I11/I12 successors) to the chunk model; re-sync the embedded DES-058 DESIGN.md entry verbatim; update the Acceptance-criteria and Rolling-upgrade sections (upgrade story is now: new binary writes to .punt-labs/local + seals chunks; old committed files frozen; no seeding, no reconciling commit)'
