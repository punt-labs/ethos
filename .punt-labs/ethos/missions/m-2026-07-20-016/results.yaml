      prose: |
        Simplification pass honoring all four operator rulings; the doc shrank
        from 962 to 804 lines (net -158). Every killed mechanism — merge driver,
        .gitattributes, byte-prefix verification, divergence/reseal, resume
        offset, seq allocation, committing-session scoping, orphan detection,
        checkout-path scoping, and live-file seeding — is removed from the body
        and recorded in Rejected alternatives with the operator ruling as the
        reason. None is reintroduced as an option.

        Three worker-owned design decisions, made and justified. Chunk filename:
        audit-<first>-<last>.jsonl with 19-digit zero-padded Unix-nanosecond
        first/last timestamps — sorts chronologically (fixed-width int),
        collision-free (per-session ts strictly monotonic, distinct dirs across
        sessions), filesystem-safe. Watermark: max <last> across chunk
        filenames, so it is computed from the directory listing without opening
        a chunk; a frozen legacy audit.jsonl has its last line read once.
        Atomicity: temp + rename in the sealed dir — a crash before rename
        leaves an ignored temp, a crash after rename before git add leaves a
        complete untracked chunk the next commit stages, and a tracked chunk is
        never partial.

        One consequential co-location: the live-writer/seal session flock moves
        with the live file into .punt-labs/local/ (per-checkout), since two
        checkouts now have distinct live files and must not contend. Mission
        locks are unchanged — global tree, keyed by mission ID. markdownlint
        clean; embedded DES-058 DESIGN.md entry kept verbatim in sync with the
        body.
