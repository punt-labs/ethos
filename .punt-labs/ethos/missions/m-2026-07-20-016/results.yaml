      prose: |
        Round-2 hardening applies all four REQ and three OPT edits from rsc's
        APPROVE-WITH-NAMED-EDITS review; no operator ruling is reopened and the
        chunk model stands. The doc grew 804 -> 944 lines (+140) — expected,
        since round 2 adds correctness machinery rather than removing it.

        R1 (branch rewind overlap): the read path now unions all chunks plus
        the live tail, dedups by (session, ts), and sorts by ts. A new
        "Cross-branch re-seal" section walks the A/B/main scenario, keeps
        re-sealing on the rewound branch as the DESIRED behavior (suppressing
        it loses the record on the merging branch — added to Rejected), and
        proves the dedup loss-free (equal ts => byte-identical line from the
        same append-only live file). I11-chunk disjointness is scoped to a
        single tree state; I11-idem allows >=1 chunk with byte-identical
        duplicates; I12-merge and the "output identical" acceptance criterion
        are reworded. The dedup keys on the ruled (session, ts) identity — not
        a seq field, not a merge driver.

        R2 (orphan chunk): the seal's final step now unconditionally git-adds
        every untracked audit chunk in the session dir, including on the
        empty-tail path, so a crash between rename and add cannot leave a
        permanently untracked file. The algorithm and the crash narrative agree.

        R3 (gitlink): a third seal-failure branch — gitlink-mounted
        .punt-labs/ethos/ is a no-op exit 0 until e29s, live lines stay in
        .punt-labs/local/ (clean tree already met), sealed later — explicitly
        distinct from the EACCES/EIO exit-2 class so consuming repos are not
        blocked.

        R4 (dir date): the sealed directory's date is pinned to the session
        start date from the roster, one directory per session for its whole
        life, stated at the zone table and echoed in chunk sealing — a
        midnight-spanning session no longer splits or regresses the watermark.

        OPTs: a malformed chunk filename fails the seal (exit 2) rather than
        silently regressing the watermark; the legacy-file watermark is the max
        ts over all its lines, not the last line; and the timestamp subsystem
        (rewind-robust via live-file recovery) is explicitly distinguished from
        the seal/read subsystem (rewind handled by the read dedup). Embedded
        DES-058 entry re-synced; markdownlint clean.
