      prose: |-
        Root cause: install.sh treated an existing hook as a reason to skip (warn-and-skip). Beads installs .git/hooks/pre-commit on every org machine, so the DES-058 seal — the live audit write path's primary trigger — never installed, and the only vacuum warning lives inside `audit seal`, which never ran. Nothing surfaced the absence.

        Fix (install.sh): new install_hook() replaces both no-clobber blocks (step 6c commit-msg, 6d pre-commit). Four cases — no hook -> cp standalone (fresh path unchanged); our marker section present -> strip and re-append (idempotent); our standalone present (grep DESREF, no markers) -> refresh; foreign hook -> append a marker-delimited "ETHOS DES-058 SEAL" / "ETHOS DES-054 TRAILER" section (beads-integration marker pattern) carrying the hook body. Section is appended at end so it runs when the host content falls through; the host's last non-blank line is checked and an unconditional `exit` is warned. Marker match is by prefix, so the versioned interim BEGIN (v4.1.0) is stripped and upgraded in place with no duplication.

        Doctor: CheckSealHook (internal/doctor) verifies the current repo's pre-commit hook carries an active seal — PASS for a chained marker section or the standalone hook; FAIL "missing" (no hook / foreign hook without seal) and FAIL "stale" (DES-058 section present but no `audit seal` call), each with the remedy to re-run install.sh. gitHooksDir resolves the .git gitdir file for worktrees and submodules. Registered in RunAll; check count in the cmd and mcp doctor tests updated 5 -> 6, and the cmd all-pass fixture now installs a seal hook.

        commit-msg finding: commit-msg SHARES the identical no-clobber flaw (install.sh:268-274 pre-change). It differs in one respect — it is not triggered on org machines today, because beads does NOT install a commit-msg hook (this repo's .git/hooks/ shows beads owns post-checkout, post-merge, pre-push, prepare-commit-msg, and pre-commit, but not commit-msg), so ethos wins the empty slot and the standalone cp succeeds. pre-commit's no-clobber path, by contrast, fired on every machine because beads owns pre-commit. Fixed both the same way for defense in depth: if any future tool claims commit-msg, ethos now chains instead of silently skipping.

        Release note: install.sh VERSION left at 4.1.0 — the release process owns the version bump; setting it to an untagged version here would break the binary download until the tag exists.

        Verification: make check green (go vet, staticcheck, shellcheck hooks/*.sh install.sh, markdownlint, go test -race, validate-content). No suppressions added. Three incremental commits, each make-check-green: a1349f9 installer, 72fd8d9 doctor + fixtures, 2d0b478 docs. Branch fix/hook-chain-seal pushed.
