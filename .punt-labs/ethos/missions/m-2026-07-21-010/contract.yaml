context: |
    Bead ethos-2ol1 (P1), found during v4.1.0 local validation: every org
    machine has a beads-managed .git/hooks/pre-commit, and install.sh's
    no-clobber warn-and-skip means the DES-058 seal hook — the feature's
    PRIMARY trigger — silently never installs. Nothing surfaces the
    absence (the vacuum warning lives inside `audit seal`, which never
    runs). The beads hook's own marker-delimited-section pattern is the
    established coexistence mechanism; its tail falls through on success
    (`if [ $_bd_exit -ne 0 ]; then exit $_bd_exit; fi`), so an appended
    section executes. This fix ships as v4.1.1 immediately on merge —
    the operator is waiting on it. Do not run make install; use .tmp/
    for scratch and test against throwaway git repos.
