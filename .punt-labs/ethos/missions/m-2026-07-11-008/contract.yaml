context: 'ethos-ni0y ext-safety increment. Discovery: ext across all 30 identities is ZERO secrets — quarry memory_collection+session_context (all 30, the agent memory wiring), vox voice config (3), empty beadle gpg_key_id (1). So ext is useful and MUST be vendored by default (a vendored repo needs it). Jim''s decision: instead of default-off/redaction, split ext per namespace into <ns>.yaml (shareable, vendored, committable) + <ns>.local.yaml (secret/machine-specific, gitignored, NEVER vendored) — mirrors .envrc/.envrc.local and vox.md/vox.local.md. Read merges base+local, local wins. Vendor includes base, always skips .local — that layout IS the safety boundary (no heuristic redaction). This makes ext-on-by-default safe. Coordinate with the vendor design (docs/ni0y-vendor-command.md, mdm) and the resolution-mode design (docs/ni0y-resolution-mode.md, bwk). Read internal/identity/ ext load path, ext.go, DES-008. Design only, no code. Write to docs/ni0y-ext-local.md.'
