context: |
    Cross-repo design request from the punt-kit agent (claude:tty16),
    2026-07-20, tracked as bead ethos-t5b6 (P1). Problem: the session
    audit log <repo>/.punt-labs/ethos/sessions/<YYYY-MM-DD>-<session-id>/audit.jsonl
    is git-tracked by design (DES-054 v5, shared history, redaction,
    commit trailers resolve against it) AND appended by the PreToolUse
    audit hook on every tool call. A file cannot be both git-tracked and
    continuously appended by a live process: any repo with an active
    session has a permanently dirty tree — observed today blocking
    `punt release` preflight (clean-tree gate on cross-repo siblings).
    The first entry in the offending audit.jsonl was a `git status` call:
    inspecting the repo dirties it.

    Non-solutions already ruled out with the CEO: gitignoring the audit
    files (defeats shared-history design), exempting .punt-labs/ from
    clean-tree checks in consumers, GitHub-side relaxation (branch
    protection is ref-scoped), and any audit-suppression sentinel (an
    audit hook with an off switch is not an audit system).

    Requested shape: (1) live writes to an untracked location; (2) a seal
    step snapshots the live log into the tracked audit.jsonl at a
    deliberate lifecycle point (pre-commit primary, mission close
    secondary). Between seals the tracked file is untouched, so trees are
    clean; a dirty sessions/ path then MEANS something — an unsealed
    record that should have been committed.

    Read DESIGN.md DES-054 v5 (storage layout, audit read-path state
    machine, concurrency model, I10-audit-atomic) and
    docs/audited-delegation.md (path redaction, commit trailers) before
    writing. The design is a doc-only mission: no code changes. Design
    only; implementation missions will be scoped after leader review and
    CEO ratification.
