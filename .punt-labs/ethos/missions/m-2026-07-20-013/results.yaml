      prose: |
        Round 2 hardens the seal mechanism without touching the ratified macro architecture (global-tree live writes, redact-at-write, pre-commit primary, session-end rejected as primary). The load-bearing change is a per-session monotonic seq allocated under the session flock, which dissolves R1 and R2 together: seq is the line identity, so the round-1 (session, ts, delegation_id, tool_input_hash) dedup tuple is gone — the flock orders writes, not the clock, and the tuple could silently drop a line. The seal now anchors resume on the last sealed line's seq, verifies the byte-prefix before appending, and fails closed on any divergence (legacy re-encode, manual edit, merge resolution, older checkout, downgrade skew) with an ethos audit reseal remedy. size(sealed) is never used as a blind offset. The merged read collapses to sealed ++ live-tail-past-last-seq with no content comparison.

        Legacy lines without seq are anchored by byte length for the first post-upgrade seal, and on first live-file open the writer seeds the live file from the committed repo file so the prefix holds across the boundary. audit migrate is fenced off any session with a live writer. Lock relocation removes the in-repo lock from disk and stops writing it (a bare git rm --cached leaves an untracked file that re-fails the very clean-tree gate this design unblocks). Pre-commit scoping is checkout-path-precise (roster repo is an absolute path) and covers the committing session plus orphaned sessions only, never a live bystander's. The fail-closed policy splits ENOENT (no-op exit 0) from EACCES/EIO (block exit 2, scoped to repo-bound sessions) so a broken audit store cannot hard-block unrelated commits.

        The invariant block (I10-audit-atomic, I11-seal, I11-idem, I12-merge) and the verbatim DES-058 DESIGN.md entry are re-synced with every change. Every REQ and the L1 leader finding are applied; every OPT is adopted, none rejected. markdownlint clean. Doc grew 591 -> 825 lines; write set confined to docs/audit-seal.md.
