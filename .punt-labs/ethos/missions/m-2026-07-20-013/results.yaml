      prose: |
        docs/audit-seal.md amends DES-054 v5 by splitting the git-tracked audit log from its live append path. Core move: invert the DES-054 tree roles. The global tree becomes the permanent live write path, the repo tree becomes the sealed committed record, and reads merge the two. This reuses the DES-054 read-path state machine and the v3.11 global paths, so it needs almost no new plumbing and no cross-repo gitignore rollout.

        Decisions:

        1. Live-file location: GLOBAL TREE (option a), the v3.11 path ~/.punt-labs/ethos/sessions/<session-id>.audit.jsonl. Rejected the gitignored in-repo sibling (option b): its clean-tree guarantee is conventional (depends on every repo carrying the ignore rule) where (a) is structural (file physically out of tree). (a) needs no rollout and co-locates live audit with session state already living global.

        2. Live lines are REDACTED, not raw. Redaction already precedes hashing in the DES-054 write path, so leaving it there makes the seal a transformation-free byte copy, keeps redaction in one place, and prevents absolute-path leakage into the global tree at rest. tool_input_hash stays over the redacted form (DES-052 unchanged).

        3. Seal points: PRIMARY at pre-commit (seal + git add so the record lands in the same commit/PR as the work; pre-commit not commit-msg because commit-msg runs after the index snapshot). SECONDARY at ethos mission close (Tier B). Session-end rejected as primary because sessions outlive PRs and may never end cleanly.

        4. Seal algorithm: sealed is a byte-exact prefix of live; seal appends live[size(sealed):last_newline(live)] under the SAME per-session flock the live writer uses. Cutting at the last newline skips a crashed writer's torn tail; holding the flock serializes against concurrent appends and concurrent seals (which chain byte ranges — no drop, no duplicate). Repo-scoped: a commit seals only sessions whose roster repo matches, so multi-repo pre-commits touch disjoint files.

        5. Dedup key for merged sealed+live reads: the tuple (session, ts, delegation_id, tool_input_hash), repo-wins. Requires RFC3339Nano ts so the key never collapses two distinct calls. Merged read = sealed ++ {live tail not already keyed in sealed}; output is identical to the pre-change single-file read.

        6. Mission-tree churn: log.jsonl gets the same live-write/seal treatment with the authoritative seal at MISSION CLOSE and pre-commit as the clean-tree backstop (one sweep mechanism, two triggers). All .lock files MOVE to the global tree (never git-tracked); existing tracked .create.lock is git rm --cached'd by migration. A global lock keyed by the globally-unique mission ID is more correct for cross-checkout safety than the DES-054 in-repo lock.

        Invariants: I10-audit-atomic amended (appends target the live log under the session flock; sealed file written only by the seal step); new I11-seal, I11-idem, I12-merge formalize prefix/idempotence/merge. Seal failure is fail-closed (pre-commit exit 2, DES-055 shape); a commit with no repo-bound live lines is a no-op exit 0. Migration keeps existing tracked logs as sealed history, adds ethos audit seal (idempotent, --dry-run, partial-failure resume, does NOT delete the live file), and relocates locks. Transition is two minor versions per DES-054 convention.

        Proposed DES-058 DESIGN.md entry text is included verbatim at the end of the doc for the document stage to drop in after DES-057.
