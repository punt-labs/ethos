        Lens: black-box, CLI-surface, adversarial. I read the round-2
        evaluation (m-2026-07-22-002-eval-rop.md) and the design's
        test-strategy section and added only the gaps, never re-testing
        what the existing tables cover.

        What was already covered and left alone: claudemd EOL/idempotent/
        code-block/open-fence/trailing-whitespace/symlink/mode/lock;
        every githook chain/unchain scenario incl. worktree/hooksPath
        parity; enable round-trip/zone-carve-out/idempotent/interim-
        convergence/marker-last/gitlink-guard/worktree-refuse and the
        in-process marker-gate runtime; doctor's four seal states in
        doctor_test.go.

        Gaps I closed:
          1. Cross-feature integration (the one behavior nobody had
             tested end-to-end): a REAL git commit driving the chained
             pre-commit with the built ethos binary on PATH. Phase 1
             enabled → two live lines seal into a tracked chunk. Phase 2
             disabled → no new chunk AND a foreign host pre-commit still
             runs (sentinel counter proves it). Phase 3 re-enabled → the
             line stranded during the disabled window seals on the next
             commit (the seal unions the live tail past the watermark —
             the operator-ratified strand semantics). This is also the
             automated dogfood the design calls for.
          2. Black-box CLI surface via the built binary (subprocess,
             matching cmd/ethos/subprocess_test.go): enable/disable
             success, --json per-step shape, CLI-level re-run idempotence,
             and exit codes (not-in-repo=2, gitlink=1, open-fence=1,
             worktree-refusal=1, --force=0) — the in-process tests never
             exercised real argv, real exit codes, or real stderr.
          3. Adversarial hosts (claudemd): a dangling CLAUDE.md symlink
             (EvalSymlinks fails → error, link and target untouched) and
             an unwritable target directory (CreateTemp fails → error,
             host file byte-unchanged — the atomic rename never fires, so
             no half-state). Both were safe, defined behaviors; no
             production bug found.
          4. No-host-file semantics pinned with a citing comment: enable
             on a repo with no CLAUDE.md creates it 0644 containing only
             the canonical import — the standard's "append to the host"
             degrading to create-with-just-the-import. Plus setup/enable
             separation: enable writes no config zone and emits the setup
             hint.

        No production code modified (write-set is tests only). No
        suppressions, no skipped-by-default tests, no xfail. Fixtures use
        /tmp or t.TempDir() for explicit-path unit tests; every
        enable/CLI/seal fixture is rooted in /tmp with an isolated HOME so
        a resolution escape cannot contaminate this repo and the seal's
        global reads stay off the real home. Coverage did not decrease in
        any package.
