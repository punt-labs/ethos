        Commit fa9a864.

        REQ-1 (blocking) fixed. rop's diagnosis was exact: two coupled
        faults on the shared runCLI helper's timeout branch. (1) After
        cmd.Process.Kill() the branch read errBuf.String() while the
        os/exec output-copy goroutine was still writing and cmd.Wait()
        had not returned — a real data race that -race turns a load
        timeout into. Fixed by killing, then draining the done channel
        (Wait returned) BEFORE touching either buffer. (2) The 5s
        per-subprocess budget was too tight for a real-git-work `ethos
        enable` when ~20 -race packages compile and run concurrently, so
        the racy branch actually fired. Raised to 30s — reached only on a
        genuine hang. Both changes carry a comment explaining why. The
        helper predates this stage but the new seal test (six
        subprocess-heavy phases) is what trips it and the fix belongs
        here; no existing-issue excuse.

        MCP item: FIXED, not deferred. TestMCP_ToolsList (internal/mcp,
        in the write-set) failed the same clean -race run with "transport
        error: context deadline exceeded". Investigated: it is the same
        class — a too-tight deadline under load, NOT the kill-then-read
        shape. The MCP stdio transport spawns `ethos serve` as a
        subprocess; under -race that server binary is itself
        race-instrumented and competes for CPU, so the client's 5s
        context deadline expired mid-handshake. There is no shared-buffer
        race in the MCP test (unlike runCLI), so the correct minimal fix
        is a deadline tune. Replaced the three 5s literals
        (Initialize, CallTool, ListTools) with one named const
        mcpRPCTimeout = 30s carrying an explanatory comment. Confirmed
        green across both clean-cache runs.

        Verified exactly as rop caught it: `go clean -testcache` then a
        full `go test -race ./...`, twice, both green, then make check.
        No suppressions, no skipped tests, no xfail. Coverage unchanged
        (the edits are to test-harness control flow and deadlines, not
        new assertions).
